<div class="h-full flex flex-col bg-white text-gray-800">

  <!-- Header -->
  <div class="px-6 pt-6">
    <h1 class="text-3xl font-bold text-blue-400">Star Wars Fleet</h1>
  </div>
  <div class="flex items-center gap-3 px-4 py-2 border-b border-gray-200 shrink-0">
    <div class="flex items-center gap-2 border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-500 w-56">
      <span>🔍</span>
      <span>Search elements...</span>
    </div>
    <span class="text-sm text-gray-400">{{ starships.length }} elements</span>
  </div>

  <!-- Loader -->
  <div *ngIf="isLoading"
       class="flex-1 flex items-center justify-center text-gray-400">
    Chargement des vaisseaux...
  </div>

  <!-- Erreur -->
  <div *ngIf="errorMessage"
       class="flex-1 flex items-center justify-center gap-4 text-red-500">
    <span>{{ errorMessage }}</span>
    <button (click)="retry()"
            class="bg-blue-500 text-white px-4 py-1 rounded text-sm">
      Réessayer
    </button>
  </div>

  <!-- Grid : flex-1 + min-h-0 = prend tout l'espace sans déborder -->
  <div class="flex-1 min-h-0">
    <app-starship-grid
      *ngIf="!isLoading && !errorMessage"
      [starships]="starships"
      [hasMore]="swapiService.hasMorePages()"
      (loadMore)="onLoadMore()">
    </app-starship-grid>
  </div>

</div>
