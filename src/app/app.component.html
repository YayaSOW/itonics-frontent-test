<div class="h-full flex flex-col bg-white text-gray-800">
  <div class="px-6 pt-6">
    <h1 class="text-3xl font-bold text-blue-400">Star Wars Fleet</h1>
  </div>
  <div
    class="flex items-center gap-3 px-4 py-2 border-b border-gray-200 shrink-0"
  >
    <app-search-bar (searchChanged)="onSearchChanged($event)"> </app-search-bar>
    <span class="text-sm text-gray-400">{{ starships.length }} elements</span>
  </div>

  <div
    *ngIf="isLoading"
    class="flex-1 flex items-center justify-center text-gray-400"
  >
    Chargement des vaisseaux...
  </div>

  <div
    *ngIf="errorMessage"
    class="flex-1 flex flex-col items-center justify-center gap-4"
  >
    <div class="text-red-400 text-lg"> {{ errorMessage }}</div>
    <button
      (click)="retry()"
      class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded text-sm transition-colors"
    >
      Retry
    </button>
  </div>

  <div
    *ngIf="!isLoading && !errorMessage && starships.length === 0"
    class="flex-1 flex items-center justify-center text-gray-400"
  >
    No results found for "{{ searchTerm }}"
  </div>

  <div class="flex-1 min-h-0" *ngIf="!isLoading && !errorMessage">
    <app-starship-grid
      [starships]="starships"
      [hasMore]="swapiService.hasMorePages()"
      (loadMore)="onLoadMore()"
    >
    </app-starship-grid>
  </div>

  <div
    *ngIf="scrollErrorMessage"
    class="flex items-center justify-center gap-3 py-2 bg-red-50 border-t border-red-100 shrink-0"
  >
    <span class="text-red-500 text-sm">{{ scrollErrorMessage }}</span>
    <button
      (click)="retryScroll()"
      class="text-blue-500 text-sm underline hover:text-blue-700"
    >
      Retry
    </button>
  </div>

  <div
    *ngIf="allLoaded"
    class="text-center text-sm text-gray-400 py-2 border-t border-gray-100 shrink-0"
  >
    ✓ All {{ allStarships.length }} starships loaded
  </div>
</div>
