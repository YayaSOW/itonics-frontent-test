<div class="flex items-center gap-2 border border-gray-300 rounded px-3 py-1.5 text-sm text-gray-500 w-64 bg-white focus-within:border-blue-400 transition-colors">

  <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
  </svg>

  <input
    type="text"
    [(ngModel)]="searchTerm"
    (input)="onInput()"
    placeholder="Search elements..."
    class="flex-1 outline-none bg-transparent text-gray-700 placeholder-gray-400 text-sm"/>

  <button
    *ngIf="searchTerm"
    (click)="clear()"
    class="text-gray-400 hover:text-gray-600 text-lg leading-none">
    ×
  </button>

</div>
